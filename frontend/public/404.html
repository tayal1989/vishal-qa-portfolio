<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Vishal QA Portfolio</title>
    <script type="text/javascript">
      // Single Page App GitHub Pages redirect trick
      // When GitHub Pages serves a 404 for a SPA route, this script
      // redirects back to the root with the path encoded as a query param.
      // The index.html reads it back and restores the route.
      var segmentCount = 1; // number of path segments in the repository name
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
