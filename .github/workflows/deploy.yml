name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Prepare package.json for CI
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            // Remove private/problematic packages for CI
            delete pkg.devDependencies['@emergentbase/visual-edits'];
            // Remove packageManager to allow npm to run
            delete pkg.packageManager;
            // Override build script to use react-scripts directly
            pkg.scripts.build = 'react-scripts build';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            console.log('package.json updated for CI');
          "
        working-directory: frontend

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          CI: false
          GENERATE_SOURCEMAP: false

      - name: Debug on failure
        if: failure()
        run: |
          echo "Build failed. Checking for errors..."
          cat /home/runner/work/vishal-qa-portfolio/vishal-qa-portfolio/frontend/npm-debug.log 2>/dev/null || true
          ls frontend/build 2>/dev/null || echo "No build directory"
        working-directory: .

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/build
          publish_branch: gh-pages
