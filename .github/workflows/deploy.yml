name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Prepare package.json for CI
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            // Remove private/problematic packages for CI
            delete pkg.devDependencies['@emergentbase/visual-edits'];
            // Remove packageManager to allow npm to run
            delete pkg.packageManager;
            // Override build script to use react-scripts directly, disable ESLint
            pkg.scripts.build = 'react-scripts build';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            console.log('package.json updated for CI');
          "
        working-directory: frontend

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          CI: false
          GENERATE_SOURCEMAP: false
          DISABLE_ESLINT_PLUGIN: true
          TSC_COMPILE_ON_ERROR: true
          ESLINT_NO_DEV_ERRORS: true

      - name: Debug on failure
        if: failure()
        run: |
          echo "=== BUILD FAILURE DEBUG ==="
          echo "Node: $(node --version)"
          echo "NPM: $(npm --version)"
          echo "Package.json scripts:"
          cat frontend/package.json | python3 -c "import sys,json; pkg=json.load(sys.stdin); print(json.dumps(pkg.get('scripts',{}), indent=2))"
          echo ""
          echo "=== Checking for ESLint config ==="
          ls frontend/.eslint* 2>/dev/null || echo "No .eslint files found"
          echo ""
          echo "React Scripts version:"
          cat frontend/node_modules/react-scripts/package.json | python3 -c "import sys,json; pkg=json.load(sys.stdin); print(pkg.get('version','unknown'))"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/build
          publish_branch: gh-pages
